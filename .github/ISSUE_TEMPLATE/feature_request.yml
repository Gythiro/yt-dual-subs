name: "💡 功能建议 / Feature request"
description: "想要的新功能或改进 / Suggest an idea"
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: "你想要什么功能? / What would you like?"
      description: "描述一下使用场景和期望的效果 / Describe the use case and what you'd expect to happen."
    validations:
      required: true
  - type: textarea
    id: alt
    attributes:
      label: "现在是怎么凑合的?(可选) / Current workaround (optional)"
      description: "了解你现在的替代做法有助于设计 / Knowing your current workaround helps design the feature."
